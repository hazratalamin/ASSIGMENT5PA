<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
   
</head>
<body>
    <section class="flex flex-col items-center justify-center p-8 " >
        <div class="flex items-center justify-center">
            <img src="./assets/github-logo.png" alt="" class="w-20 h-20">
           
        </div>
        <div class="text-center">
           
            <h1 class="text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
              <p class="text-gray-400 text-sm mb-8 font-medium">Sign in to manage your issues</p>
           
          
        </div>
        <div class="w-full max-w-sm space-y-4">
    
    <div>
        <label class="block text-gray-700 font-semibold mb-1">Username</label>
        <input id="username" type="text" placeholder="Enter Username" 
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        <p class="text-purple-600 text-xs mt-1 italic">Default: admin</p>
    </div>

    <div>
        <label class="block text-gray-700 font-semibold mb-1">Password</label>
        <input id="password" type="password" placeholder="Enter Password" 
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        <p class="text-purple-600 text-xs mt-1 italic">Default: admin123</p>
    </div>
<div class="pt-2">
        <button onclick="btnLogin()" class="w-full bg-[#6000ff] hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition duration-300">
            Sign In
        </button>
        <p id="message" class="text-center mt-4 font-semibold"></p>
    </div>
    <div class="w-full max-w-sm mt-8">
    <div class="flex items-center gap-4 my-4">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <div class="bg-gray-50 p-4 rounded-xl text-center border border-gray-100">
    <p class="text-gray-500 text-sm font-medium mb-2">Demo Credentials:</p>
        <div class="text-gray-700 text-sm">
     <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
</div>
    </div>
</div>
</div>

    </section>
</body>

<script src="script.js"></script>
</html>
